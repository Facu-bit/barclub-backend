# ============================================
# Bar Club - Configuracion de la aplicacion
# ============================================

# Servidor
server.port=8080

# Base de datos MySQL - Railway usa variables de entorno
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/barclub_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires&allowPublicKeyRetrieval=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Komer954!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Serialización de fechas
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=America/Argentina/Buenos_Aires
spring.jackson.serialization.write-dates-as-timestamps=false

# Logging
logging.level.com.barclub=INFO
logging.level.org.springframework.security=WARN

# Tamaño máximo para requests con logo en base64 (hasta 5MB)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.mvc.pathmatch.use-suffix-pattern=false
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-threads=20
spring.jackson.max-nesting-depth=50

# JWT
jwt.secret=BarClubSanJoseSecretKeyMuySegura2026ParaJWT
jwt.expiration=86400000
